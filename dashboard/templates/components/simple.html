<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #sidebar {
      height: 100%;
      width: 250px;
      position: fixed;
      top: 0;
      left: -250px;
      background-color: #111;
      transition: 0.3s;
      padding-top: 60px;
      color: white;
    }

    #sidebar a {
      padding: 8px 8px 8px 32px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      display: block;
      transition: 0.3s;
    }

    #sidebar a:hover {
      color: #ff9800;
    }

    #main {
      transition: margin-left 0.3s;
      padding: 16px;
    }

    #open-btn {
      font-size: 30px;
      cursor: pointer;
      position: fixed;
      z-index: 1;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <a href="#" onclick="closeNav()">Close</a>
  <a href="#">Link 1</a>
  <a href="#">Link 2</a>
  <a href="#">Link 3</a>
</div>

<div id="main">
  <span id="open-btn" onclick="openNav()">&#9776; Open</span>
  <h2>Main Content</h2>
  <p>This is where your main content goes.</p>
</div>

<script>
  function openNav() {
    document.getElementById("sidebar").style.left = "0";
    document.getElementById("main").style.marginLeft = "250px";
  }

  function closeNav() {
    document.getElementById("sidebar").style.left = "-250px";
    document.getElementById("main").style.marginLeft= "0";
  }
</script>

</body>
</html>
